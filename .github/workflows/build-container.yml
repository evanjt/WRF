name: Build and Push WRF Container

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type of build to run'
        required: true
        default: 'base'
        type: choice
        options:
        - base
        - pr
  schedule:
    # Rebuild library cache daily (02:00 UTC) to ensure fresh dependencies
    - cron: '0 2 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wrf
  BASE_IMAGE_NAME: ${{ github.repository_owner }}/wrf-snpack-base

jobs:
  build-base:
    if: github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'base')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Get current date for tagging
      id: date
      run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

    - name: Build and push base image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}:latest
          ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}:${{ steps.date.outputs.date }}
        labels: |
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.created=${{ github.sha }}
          org.opencontainers.image.revision=${{ github.sha }}
        build-args: |
          BUILDKIT_PROGRESS=plain
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

  build-pr:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'pr')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Initialize and update submodules
      run: |
        git submodule update --init --recursive phys/MYNN-EDMF
        git submodule update --init --recursive phys/noahmp
        git submodule update --init --recursive phys/cryowrf/meteoio
        git submodule update --init --recursive phys/cryowrf/snowpack

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=pr
          type=sha,prefix=pr-

    - name: Pull latest base image
      run: |
        docker pull ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}:latest || \
        docker pull ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}:$(date -d '1 day ago' +%Y%m%d) || \
        echo "Using fallback base image"

    - name: Build development image with phys changes only
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.dev
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: |
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
        build-args: |
          BUILDKIT_PROGRESS=plain
        cache-from: type=gha
        platforms: linux/amd64

    - name: Validate WRF compilation
      run: |
        echo "Checking if WRF compiled successfully..."
        docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$(echo ${{ steps.meta.outputs.tags }} | head -n1) bash -c "
          if [ -f '/home/wrfuser/wrf-build/WRF/main/wrf.exe' ]; then
            echo 'SUCCESS: wrf.exe found at expected location'
            ls -la /home/wrfuser/wrf-build/WRF/main/wrf.exe
            echo 'WRF compilation validation PASSED'
          else
            echo 'FAILURE: wrf.exe not found'
            echo 'Searching for executable in alternative locations...'
            find /home/wrfuser/wrf-build/WRF -name 'wrf.exe' -type f 2>/dev/null || echo 'No wrf.exe found anywhere'
            exit 1
          fi
        "

