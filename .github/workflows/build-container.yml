name: Build and Push WRF Container

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
  schedule:
    # Rebuild library cache weekly (Sundays at 02:00 UTC) to ensure fresh dependencies
    - cron: '0 2 * * 0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wrf

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Initialize and update submodules
      run: |
        git submodule update --init --recursive phys/MYNN-EDMF
        git submodule update --init --recursive phys/noahmp
        git submodule update --init --recursive phys/cryowrf/meteoio
        git submodule update --init --recursive phys/cryowrf/snowpack

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=sha,format=short
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build libraries stage (pre-cache heavy dependencies)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        target: libraries-build
        platforms: linux/amd64
        push: false
        cache-from: type=gha,scope=libraries
        cache-to: type=gha,mode=max,scope=libraries
        build-args: |
          BUILDKIT_INLINE_CACHE=1
      # Force library rebuild on schedule or when Dockerfile changes
      env:
        FORCE_REBUILD: ${{ github.event_name == 'schedule' || contains(github.event.head_commit.message, '[rebuild-libs]') }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: |
          type=gha,scope=libraries
          type=gha,scope=wrf-source
          type=gha,scope=wrf-build
        cache-to: |
          type=gha,mode=max,scope=wrf-source
          type=gha,mode=max,scope=wrf-build
        build-args: |
          BUILDKIT_INLINE_CACHE=1

